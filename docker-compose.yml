services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ariana-asterisk-gateway
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-329}:${PORT:-3002}"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:$${process.env.PORT || 3002}/api/health`).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ariana-asterisk-network

networks:
  ariana-asterisk-network:
    driver: bridge
